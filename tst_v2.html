<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: sans-serif;
    background-color: #111;
    color: white;
    text-align: center;
    padding: 20px;
  }
  
  /* THIS IS THE CSS TRICK TO HIDE THE TITLE */
  .movie-clip-container {
    position: relative;
    width: 640px;
    height: 360px;
    margin: 0 auto 40px auto;
    overflow: hidden; /* This hides everything outside the 640x360 box */
    border: 3px solid #333;
    border-radius: 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }

  .movie-clip-container iframe {
    position: absolute;
    /* We push the iframe up by 65 pixels to hide the top YouTube title bar */
    top: -65px; 
    left: 0;
    width: 100%;
    /* We add 130px to the height to compensate for the top/bottom shift */
    height: calc(100% + 130px); 
  }

  .spoiler {
    background-color: #000;
    color: #000;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 4px;
    transition: background-color 0.3s;
  }
  
  /* Reveal movie name when hovering over the black spoiler box */
  .spoiler:hover {
    color: #fff;
  }
</style>
</head>
<body>

<!-- Candidate 2 -->
  <div class="movie-clip-container">
    <iframe src="https://www.youtube.com/embed/WCN5JJY_wiA?start=154&end=168&controls=1&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

</body>
</html>
