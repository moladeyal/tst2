<!DOCTYPE html>
<html>
<head>
    <style>
        .container {
            position: relative;
            width: 560px;
            height: 315px;
        }
        /* This is your black screen */
        #blindfold {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none; /* Hidden by default */
            z-index: 10;
            color: white;
            text-align: center;
            font-family: sans-serif;
            padding-top: 100px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="blindfold"><h1>TIME IS UP!</h1></div>
        
        <iframe id="videoPlayer" width="560" height="315" 
            src="https://www.youtube.com/embed/8DajVKAkL50?start=10&end=20&autoplay=1" 
            frameborder="0" allow="autoplay">
        </iframe>
    </div>

    <button onclick="startGame()">Start 10s Clip</button>

    <script>
        function startGame() {
            // 1. Show the video (hide blindfold if playing again)
            document.getElementById('blindfold').style.display = 'none';
            
            // 2. Set a timer for 10 seconds (10000 milliseconds)
            setTimeout(function() {
                document.getElementById('blindfold').style.display = 'block';
            }, 10000); 
        }
    </script>

</body>
</html>
